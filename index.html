<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

    <title>Document</title>

  <body>
    <section id="mapa1">

      <button id="boton-favoritos">Mostrar mis terremotos favoritos</button>
      <div id="map"></div>
    </section>

    <section id="mapa2">
      <label for="fecha_inicio">Magnitud</label>
      <input type="number" id="input-magnitud" placeholder="Magnitud" />

      <label for="fecha_inicio">Fecha inicio</label>
      <input type="date" id="input-fecha-inicio" name="fecha_inicio" />

      <label for="fecha_fin">Fecha fin</label>
      <input type="date" id="input-fecha-fin" name="fecha_fin" />

      <div id="map2"></div>
    </section>

    <!-- Firebase App -->
