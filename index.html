<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <!--Integración con Leaflet-->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <title>Web Terremotos</title>
  </head>

  <body>
    <h1>Web Terremotos</h1>

    <section id="mapa1">
      <h2>Terremotos de la última semana</h2>

      <div id="botones-mapa1">
        <button id="boton-todos-terremotos">
          Mostrar todos los terremotos
        </button>
        <button id="boton-favoritos">Mostrar mis terremotos favoritos</button>
      </div>

      <div id="map"></div>
    </section>

    <section id="mapa2">
      <h2>Filtrado de terremotos</h2>

      <article id="filtros">
        <div id="filtro-magnitud">
          <label for="input-magnitud">Magnitud:</label>
          <input
            type="number"
            id="input-magnitud"
            name="input-magnitud"
            placeholder="Introduce magnitud"
          />
        </div>

        <div id="filtro-fechas">
          <label for="fecha_inicio">Fecha inicio:</label>
          <input type="date" id="input-fecha-inicio" name="fecha_inicio" />
          <label for="fecha_fin">Fecha fin:</label>
          <input type="date" id="input-fecha-fin" name="fecha_fin" />
        </div>
      </article>

      <div id="map2"></div>
    </section>

    <section id="autenticacion">
      <h2>Autenticación</h2>

      <article id="formulario-registro">
        <h3>Registro</h3>
        <form id="form-registro">
          <input type="email" id="correo" placeholder="Email" required />
          <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required
          />
          <input
            type="password"
            id="password2"
            placeholder="Repetir contraseña"
            required
          />
          <button type="submit">Registrarse</button>
        </form>
      </article>

      <article id="formulario-login">
        <h3>Login</h3>
        <form id="form-inicio-sesion">
          <input type="email" id="correo2" placeholder="Email" required />
          <input
            type="password"
            id="password3"
            placeholder="Contraseña"
            required
          />
          <button type="submit">Iniciar sesión</button>
        </form>
      </article>

      <article id="formulario-logout">
        <h3>Sesión</h3>
        <p id="nombre-usuario" style="display: none"></p>
        <!--Mostrará el nombre del usuario en caso de que tenga activa la sesión en la página-->
        <button id="cerrar-sesion">Cerrar sesión</button>
      </article>
    </section>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
    <!-- Firestore y Auth -->
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-storage-compat.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
